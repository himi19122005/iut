<svg viewBox="0 0 900 560" xmlns="http://www.w3.org/2000/svg" font-family="Inter, Arial, sans-serif">
  <rect width="900" height="560" fill="#14171a"/>

  <!-- Simulator -->
  <rect x="330" y="30" width="240" height="70" rx="10" fill="#2a2e33" stroke="#5fd3c4" stroke-width="2"/>
  <text x="450" y="58" fill="#e8e6e1" font-size="15" text-anchor="middle" font-weight="600">Simulator</text>
  <text x="450" y="78" fill="#8a8f96" font-size="12" text-anchor="middle">background thread inside Flask</text>

  <!-- Arrow down to Flask -->
  <line x1="450" y1="100" x2="450" y2="150" stroke="#8a8f96" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Flask backend -->
  <rect x="250" y="150" width="400" height="110" rx="10" fill="#1e2226" stroke="#ffd166" stroke-width="2"/>
  <text x="450" y="180" fill="#e8e6e1" font-size="16" text-anchor="middle" font-weight="700">Flask Backend</text>
  <text x="450" y="200" fill="#8a8f96" font-size="12" text-anchor="middle">single source of truth</text>
  <text x="450" y="222" fill="#e8e6e1" font-size="12" text-anchor="middle">REST: /api/devices  /api/usage</text>
  <text x="450" y="242" fill="#e8e6e1" font-size="12" text-anchor="middle">WebSocket: device_update, usage_update</text>

  <!-- Arrows down to Dashboard and Bot -->
  <line x1="330" y1="260" x2="180" y2="330" stroke="#8a8f96" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="570" y1="260" x2="720" y2="330" stroke="#8a8f96" stroke-width="2" marker-end="url(#arrow)"/>

  <text x="200" y="300" fill="#8a8f96" font-size="12">WebSocket push +</text>
  <text x="200" y="316" fill="#8a8f96" font-size="12">REST (initial load)</text>

  <text x="700" y="300" fill="#8a8f96" font-size="12">REST calls on</text>
  <text x="700" y="316" fill="#8a8f96" font-size="12">command / schedule</text>

  <!-- Dashboard -->
  <rect x="60" y="330" width="240" height="90" rx="10" fill="#2a2e33" stroke="#5fd3c4" stroke-width="2"/>
  <text x="180" y="365" fill="#e8e6e1" font-size="15" text-anchor="middle" font-weight="600">Web Dashboard</text>
  <text x="180" y="385" fill="#8a8f96" font-size="12" text-anchor="middle">Socket.IO client</text>
  <text x="180" y="402" fill="#8a8f96" font-size="12" text-anchor="middle">live device grid + KPIs</text>

  <!-- Bot -->
  <rect x="600" y="330" width="240" height="90" rx="10" fill="#2a2e33" stroke="#ffd166" stroke-width="2"/>
  <text x="720" y="365" fill="#e8e6e1" font-size="15" text-anchor="middle" font-weight="600">Discord Bot</text>
  <text x="720" y="385" fill="#8a8f96" font-size="12" text-anchor="middle">!status  !room  !usage</text>
  <text x="720" y="402" fill="#8a8f96" font-size="12" text-anchor="middle">!checkafterhours + 9:30 PM alert</text>

  <!-- Arrow bot to discord -->
  <line x1="720" y1="420" x2="720" y2="470" stroke="#8a8f96" stroke-width="2" marker-end="url(#arrow)"/>

  <rect x="600" y="470" width="240" height="60" rx="10" fill="#1e2226" stroke="#e8543e" stroke-width="2"/>
  <text x="720" y="505" fill="#e8e6e1" font-size="14" text-anchor="middle" font-weight="600">Discord Channel</text>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#8a8f96"/>
    </marker>
  </defs>
</svg>
